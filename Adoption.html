<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Adoption Application | Adoptito</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="img/favicon.ico" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <!-- Bootstrap 4 (Core Structure) -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Marketplace Styles -->
    <link href="css/market.css" rel="stylesheet">
    
    <style>
        .checkout-card {
            background: #fff;
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--shadow-sm);
        }
        .step-indicator {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            position: relative;
        }
        .step-indicator::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 0;
            right: 0;
            height: 2px;
            background: #eee;
            z-index: 1;
        }
        .step {
            width: 32px;
            height: 32px;
            background: #eee;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #999;
            z-index: 2;
            position: relative;
        }
        .step.active {
            background: var(--accent-color);
            color: #fff;
        }
    </style>
</head>

<body class="bg-light">
    <!-- Navbar Start -->
    <nav class="navbar navbar-expand-lg navbar-light fixed-top navbar-market px-lg-5">
        <a href="index.html" class="navbar-brand">
            <h1 class="m-0 text-primary"><i class="fas fa-paw mr-2"></i>Adopt<span class="text-accent">ito</span></h1>
        </a>
    </nav>
    <!-- Navbar End -->

    <div class="container section-padding" style="margin-top: 50px;">
        <div class="row">
            <!-- Application Form -->
            <div class="col-lg-8 mb-5">
                <div class="checkout-card reveal">
                    <div class="step-indicator">
                        <div class="step active">1</div>
                        <div class="step">2</div>
                        <div class="step">3</div>
                    </div>
                    
                    <h2 class="mb-4">Adoption Application</h2>
                    <form action="http://localhost:3000/adoption" method="POST">
                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label class="font-weight-bold">First Name</label>
                                <input type="text" class="form-control rounded-pill py-4 border-light bg-light" name="first_name" required>
                            </div>
                            <div class="col-md-6 mb-4">
                                <label class="font-weight-bold">Last Name</label>
                                <input type="text" class="form-control rounded-pill py-4 border-light bg-light" name="last_name" required>
                            </div>
                            <div class="col-12 mb-4">
                                <label class="font-weight-bold">Email Address</label>
                                <input type="email" class="form-control rounded-pill py-4 border-light bg-light" name="email" required>
                            </div>
                            <div class="col-12 mb-4">
                                <label class="font-weight-bold">Home Type</label>
                                <select class="form-control rounded-pill h-auto py-3 border-light bg-light px-4" name="home_type">
                                    <option>Apartment</option>
                                    <option>House with Garden</option>
                                    <option>Rented Accommodation</option>
                                </select>
                            </div>
                            
                            <!-- Hidden inputs for Pet Info -->
                            <input type="hidden" id="pet_name" name="pet_name">
                            <input type="hidden" id="animal_type" name="animal_type">
                        </div>
                        
                        <hr class="my-5">
                        <button type="submit" class="btn btn-market btn-market-primary btn-lg px-5">Submit Application <i class="fas fa-paper-plane ml-2"></i></button>
                    </form>
                </div>
            </div>

            <!-- Summary Sidebar -->
            <div class="col-lg-4">
                <div class="bg-white p-4 rounded-lg shadow-sm reveal">
                    <h5 class="mb-4 d-flex justify-content-between">
                        Adoption Summary <i class="fas fa-shopping-basket text-accent"></i>
                    </h5>
                    <div id="checkoutPetInfo" class="d-flex align-items-center mb-4 p-3 bg-light rounded-lg">
                        <img src="img/cats/cat 1.webp" id="summaryImg" class="rounded-circle mr-3" style="width: 60px; height: 60px; object-fit: cover;">
                        <div>
                            <h6 id="summaryName" class="m-0">Luna</h6>
                            <span id="summaryBreed" class="small text-muted">Persian Cat</span>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-muted">Adoption Fee</span>
                        <span class="font-weight-bold">$0.00</span>
                    </div>
                    <div class="d-flex justify-content-between mb-2 text-success">
                        <span class="small">Medical Records Included</span>
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between mb-4">
                        <span class="font-weight-bold">Total Pledge</span>
                        <span class="font-weight-bold text-accent">LIFETIME LOVE</span>
                    </div>
                    
                    <p class="small text-muted mb-0"><i class="fas fa-info-circle mr-2"></i> Your application will be reviewed by our team within 48 hours.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer Start -->
    <footer class="bg-white pt-5 mt-5 border-top">
        <div class="container py-4 text-center">
            <p class="m-0 text-muted">&copy; 2026 <a class="text-primary font-weight-bold" href="#">Adoptito Marketplace</a>.</p>
        </div>
    </footer>

    <!-- JS Libraries -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const petData = JSON.parse(localStorage.getItem('selectedPet'));
            if(petData) {
                document.getElementById('summaryName').textContent = petData.name;
                document.getElementById('summaryBreed').textContent = `${petData.breed} ${petData.type}`;
                document.getElementById('pet_name').value = petData.name;
                document.getElementById('animal_type').value = petData.type;
                
                if(petData.image) {
                    document.getElementById('summaryImg').src = petData.image;
                }
            }
        });
    </script>
</body>
</html>
