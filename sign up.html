<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Register | Adoptito</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="img/favicon.ico" rel="icon">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/market.css" rel="stylesheet">
</head>

<body class="bg-light">
    <!-- Navbar Start -->
    <nav class="navbar navbar-expand-lg navbar-light fixed-top navbar-market px-lg-5">
        <a href="index.html" class="navbar-brand">
            <h1 class="m-0 text-primary"><i class="fas fa-paw mr-2"></i>Adopt<span class="text-accent">ito</span></h1>
        </a>
    </nav>
    <!-- Navbar End -->

    <div class="container d-flex align-items-center justify-content-center min-vh-100 py-5">
        <div class="bg-white p-5 rounded-lg shadow-sm w-100 reveal" style="max-width: 550px; margin-top: 100px;">
            <div class="text-center mb-5">
                <h2 class="mb-3">Join the Community</h2>
                <p class="text-muted">Register to start your premium adoption journey.</p>
            </div>
            
            <form action="http://localhost:3000/signup" method="POST">
                <div class="control-group mb-4">
                    <label class="font-weight-bold ml-2">Full Name</label>
                    <input type="text" class="form-control rounded-pill py-4 border-light bg-light px-4" name="name" placeholder="John Doe" required>
                </div>
                
                <div class="control-group mb-4">
                    <label class="font-weight-bold ml-2">Email Address</label>
                    <input type="email" class="form-control rounded-pill py-4 border-light bg-light px-4" name="email" placeholder="john@example.com" required>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label class="font-weight-bold ml-2">Password</label>
                        <input type="password" class="form-control rounded-pill py-4 border-light bg-light px-4" name="password" placeholder="••••••••" required>
                    </div>
                    <div class="col-md-6 mb-4">
                        <label class="font-weight-bold ml-2">Confirm</label>
                        <input type="password" class="form-control rounded-pill py-4 border-light bg-light px-4" name="confirmPassword" placeholder="••••••••" required>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-market btn-market-primary w-100 py-3 mt-3 mb-4">Register Now</button>
                <div class="text-center">
                    <p class="mb-0 text-muted">Already a member? <a href="sign in.html" class="text-accent font-weight-bold text-decoration-none">Sign In</a></p>
                </div>
            </form>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
