<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Sign In | Adoptito</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="img/favicon.ico" rel="icon">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/market.css" rel="stylesheet">
</head>

<body class="bg-light">
    <!-- Navbar Start -->
    <nav class="navbar navbar-expand-lg navbar-light fixed-top navbar-market px-lg-5">
        <a href="index.html" class="navbar-brand">
            <h1 class="m-0 text-primary"><i class="fas fa-paw mr-2"></i>Adopt<span class="text-accent">ito</span></h1>
        </a>
    </nav>
    <!-- Navbar End -->

    <div class="container d-flex align-items-center justify-content-center min-vh-100 py-5">
        <div class="bg-white p-5 rounded-lg shadow-sm w-100 reveal" style="max-width: 500px; margin-top: 100px;">
            <div class="text-center mb-5">
                <h2 class="mb-3">Welcome Back</h2>
                <p class="text-muted">Enter your details to access the boutique.</p>
            </div>
            
            <form action="http://localhost:3000/login" method="POST">
                <div class="control-group mb-4">
                    <label class="font-weight-bold ml-2">Email Address</label>
                    <div class="input-group">
                        <div class="input-group-prepend">
                            <span class="input-group-text bg-light border-0 rounded-left-pill px-4"><i class="fas fa-envelope text-accent"></i></span>
                        </div>
                        <input type="email" class="form-control rounded-right-pill py-4 border-light bg-light" name="signInEmail" placeholder="e.g. name@domain.com" required>
                    </div>
                </div>
                
                <div class="control-group mb-5">
                    <label class="font-weight-bold ml-2">Password</label>
                    <div class="input-group">
                        <div class="input-group-prepend">
                            <span class="input-group-text bg-light border-0 rounded-left-pill px-4"><i class="fas fa-lock text-accent"></i></span>
                        </div>
                        <input type="password" class="form-control rounded-right-pill py-4 border-light bg-light" name="signInPassword" placeholder="••••••••" required>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-market btn-market-primary w-100 py-3 mb-4">Sign In to Account</button>
                <div class="text-center">
                    <p class="mb-0 text-muted">New to the marketplace? <a href="sign up.html" class="text-accent font-weight-bold text-decoration-none">Create Account</a></p>
                </div>
            </form>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
